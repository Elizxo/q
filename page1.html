<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkerboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.4rem;
    color: #111;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  /* ── Board ── */
  .board-wrap {
    position: relative;
    width: 400px;
    height: 400px;
    border: 2px solid #111;
    flex-shrink: 0;
  }

  #boardCanvas {
    position: absolute;
    top: 0; left: 0;
    display: block;
  }

  #piecesLayer {
    position: absolute;
    top: 0; left: 0;
    width: 400px;
    height: 400px;
    z-index: 10;
  }

  #arrowSvg {
    position: absolute;
    top: 0; left: 0;
    width: 400px;
    height: 400px;
    pointer-events: none;
    z-index: 20;
  }

  /* Each piece is a div containing an <img> */
  .checker {
    position: absolute;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    overflow: hidden;
  }

  .checker img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  /* CSS fallback if images are missing */
  .checker.red-fallback  { background: #cc0000; border: 2px solid #880000; }
  .checker.black-fallback { background: #111111; border: 2px solid #000; }
  .checker.selected { outline: 3px solid yellow; outline-offset: 1px; }

  /* King label shown on fallback pieces */
  .checker .king-label {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    pointer-events: none;
  }
  .checker.show-king .king-label { display: block; }

  /* ── Sidebar ── */
  .panel {
    width: 140px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn {
    background: #cc0000;
    color: #fff;
    border: none;
    padding: 10px 0;
    font-size: 0.82rem;
    font-family: Arial, sans-serif;
    cursor: pointer;
    width: 100%;
    text-align: center;
  }

  .btn:hover { background: #aa0000; }

  .btn.secondary {
    background: #111;
    color: #fff;
  }
  .btn.secondary:hover { background: #333; }

  #statusMsg {
    margin-top: 6px;
    font-size: 0.72rem;
    color: #111;
    line-height: 1.5;
    border-top: 1px solid #ccc;
    padding-top: 8px;
  }

  .hint {
    margin-top: 8px;
    font-size: 0.65rem;
    color: #888;
    line-height: 1.5;
  }
</style>
</head>
<body>

<h1>Checkerboard</h1>

<div class="layout">

  <div class="board-wrap">
    <canvas id="boardCanvas" width="400" height="400"></canvas>
    <div id="piecesLayer"></div>
    <svg id="arrowSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="panel">
    <button class="btn" id="btnNewGame">New Game</button>
    <button class="btn secondary" id="btnMoveRandomly">Move Random</button>
    <button class="btn secondary" id="btnKingRandomly">King Random</button>
    <button class="btn secondary" id="btnClear">Clear Board</button>
    <div id="statusMsg">Click New Game to start.</div>
    <div class="hint">
      Click a piece to select it, then click an empty square to move it.<br><br>
      Images: place red-piece.png, black-piece.png, red-king.png, blackking.png in the same folder.
    </div>
  </div>

</div>

<script>
/* ── BoardEvent ── */
function BoardEvent(type, details) { this.type = type; this.details = details; }

/* ── Checker ── */
function Checker(color, isKing) {
  this.color = color;
  this.isKing = isKing || false;
  this.row = null; this.col = null;
  this.toString = function() { return this.isKing ? this.color.toUpperCase() : this.color; };
}

/* ── Board ── */
function Board(size) {
  this.boardSize = size;
  this.square = [];
  for (var i = 0; i <= size; i++) this.square[i] = [];
  this.allHandlers = {};

  this.size = function() { return this.boardSize; };
  this.isValidLocation = function(r,c) { return r>=0&&r<this.boardSize&&c>=0&&c<this.boardSize; };
  this.isEmptyLocation = function(r,c) { return !(this.square[r]&&this.square[r][c]); };
  this.getCheckerAt = function(r,c) { return this.isValidLocation(r,c)?(this.square[r][c]||null):null; };
  this.getLocationOf = function(ch) { return {row:ch.row,col:ch.col}; };

  this.getAllCheckers = function() {
    var res=[];
    for(var r in this.square) for(var c in this.square[r]) if(this.square[r][c]) res.push(this.square[r][c]);
    return res;
  };

  this.add = function(checker,row,col) {
    if(!this.isValidLocation(row,col)||!this.isEmptyLocation(row,col)) return;
    checker.row=row; checker.col=col; this.square[row][col]=checker;
    this._dispatch("add",{checker:checker,row:row,col:col});
  };

  this.moveTo = function(checker,toRow,toCol) {
    if(!this.isValidLocation(toRow,toCol)||!this.isEmptyLocation(toRow,toCol)) return;
    var d={checker:checker,fromRow:checker.row,fromCol:checker.col,toRow:toRow,toCol:toCol};
    delete this.square[checker.row][checker.col];
    this.square[toRow][toCol]=checker;
    checker.row=toRow; checker.col=toCol;
    this._dispatch("move",d);
    if(this.canBeKing(checker,toRow)) this.promote(checker);
  };

  this.remove = function(checker) {
    var d={checker:checker,row:checker.row,col:checker.col};
    delete this.square[checker.row][checker.col];
    this._dispatch("remove",d);
  };

  this.clear = function() { this.getAllCheckers().forEach(function(c){this.remove(c);},this); };

  this.promote = function(checker) {
    checker.isKing=true; this._dispatch("promote",{checker:checker});
  };

  this.canBeKing = function(checker,row) {
    return checker.color==="red"?row===this.boardSize-1:row===0;
  };

  this.prepareNewGame = function() {
    this.clear();
    for(var i=0;i<this.boardSize;i++){
      this.add(new Checker("red",false),   1-(i%2), i);
      this.add(new Checker("black",false), this.boardSize-1-(i%2), i);
    }
  };

  this.getRandomChecker = function() { var a=this.getAllCheckers(); return a.length?a[Math.floor(Math.random()*a.length)]:null; };
  this.getRandomNonKing = function() { var nk=this.getAllCheckers().filter(function(c){return!c.isKing;}); return nk.length?nk[Math.floor(Math.random()*nk.length)]:null; };
  this.getRandomEmptyLocation = function() {
    var locs=[];
    for(var r=0;r<this.boardSize;r++) for(var c=0;c<this.boardSize;c++) if(this.isEmptyLocation(r,c)) locs.push({row:r,col:c});
    return locs.length?locs[Math.floor(Math.random()*locs.length)]:null;
  };

  this.addEventListener = function(type,fn) { if(!this.allHandlers[type]) this.allHandlers[type]=[]; this.allHandlers[type].push(fn); };
  this._dispatch = function(type,details) {
    var evt=new BoardEvent(type,details);
    (this.allHandlers[type]||[]).forEach(function(h){h(evt);});
  };
}

/* ── View + Interaction ── */
(function(){
  var SQ   = 50;   // 400px / 8 squares
  var PAD  = 4;    // padding around piece inside square
  var BOARD_SIZE = 8;

  var board       = new Board(BOARD_SIZE);
  var canvas      = document.getElementById('boardCanvas');
  var ctx         = canvas.getContext('2d');
  var piecesLayer = document.getElementById('piecesLayer');
  var arrowSvg    = document.getElementById('arrowSvg');
  var statusMsg   = document.getElementById('statusMsg');

  var checkerEls  = new Map();   // Checker → DOM div
  var selectedChecker = null;    // currently selected piece
  var bulkClearing = false;

  /* Image sources */
  var IMG_SRC = {
    'red-normal':   'red-piece.png',
    'red-king':     'red-king.png',
    'black-normal': 'black-piece.png',
    'black-king':   'blackking.png'
  };
  function imgKey(ch) { return ch.color+(ch.isKing?'-king':'-normal'); }

  /* ── Draw board ── */
  function drawBoard() {
    for(var r=0;r<BOARD_SIZE;r++){
      for(var c=0;c<BOARD_SIZE;c++){
        ctx.fillStyle = (r+c)%2===0 ? '#ffffff' : '#cc0000';
        ctx.fillRect(c*SQ, r*SQ, SQ, SQ);
      }
    }
  }

  /* ── Piece elements ── */
  function elLeft(col)  { return col*SQ + PAD; }
  function elTop(row)   { return row*SQ + PAD; }
  function elSize()     { return SQ - PAD*2; }

  function createCheckerEl(checker) {
    var el  = document.createElement('div');
    var img = document.createElement('img');
    var kl  = document.createElement('span');

    kl.className = 'king-label';
    kl.textContent = 'K';

    img.src = IMG_SRC[imgKey(checker)];
    img.alt = checker.toString();
    img.onerror = function() {
      img.style.display = 'none';
      el.classList.add(checker.color+'-fallback');
      kl.style.display = checker.isKing ? 'block' : 'none';
    };

    el.className = 'checker';
    el.style.width  = elSize()+'px';
    el.style.height = elSize()+'px';
    el.style.left   = elLeft(checker.col)+'px';
    el.style.top    = elTop(checker.row)+'px';

    el.appendChild(img);
    el.appendChild(kl);
    piecesLayer.appendChild(el);
    checkerEls.set(checker, el);

    // Click: select this piece
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      selectChecker(checker);
    });
  }

  function updateCheckerEl(checker) {
    var el = checkerEls.get(checker);
    if(!el) return;
    el.style.left = elLeft(checker.col)+'px';
    el.style.top  = elTop(checker.row)+'px';
    var img = el.querySelector('img');
    if(img && img.style.display !== 'none') {
      img.src = IMG_SRC[imgKey(checker)];
    }
    // update fallback king label
    var kl = el.querySelector('.king-label');
    if(kl) kl.style.display = checker.isKing ? 'block' : 'none';
    if(checker.isKing) el.classList.add('show-king');
  }

  function removeCheckerEl(checker) {
    var el = checkerEls.get(checker);
    if(el){ el.remove(); checkerEls.delete(checker); }
  }

  function removeAllEls() {
    checkerEls.forEach(function(el){ el.remove(); });
    checkerEls.clear();
  }

  /* ── Selection ── */
  function selectChecker(checker) {
    // Deselect previous
    if(selectedChecker) {
      var prev = checkerEls.get(selectedChecker);
      if(prev) prev.classList.remove('selected');
    }
    selectedChecker = checker;
    var el = checkerEls.get(checker);
    if(el) el.classList.add('selected');
    setStatus('Selected '+checker.color+(checker.isKing?' king':'')+' at ['+checker.row+','+checker.col+']. Click an empty square to move.');
  }

  function deselect() {
    if(selectedChecker) {
      var el = checkerEls.get(selectedChecker);
      if(el) el.classList.remove('selected');
    }
    selectedChecker = null;
  }

  /* ── Board canvas click: move selected piece to clicked empty square ── */
  canvas.addEventListener('click', function(e) {
    if(!selectedChecker) return;
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var col = Math.floor(x / SQ);
    var row = Math.floor(y / SQ);
    if(!board.isValidLocation(row,col)) return;
    if(!board.isEmptyLocation(row,col)){
      // Clicked on another piece — try to select it instead
      var other = board.getCheckerAt(row,col);
      if(other){ deselect(); selectChecker(other); }
      return;
    }
    // Move
    var fromRow = selectedChecker.row, fromCol = selectedChecker.col;
    board.moveTo(selectedChecker, row, col);
    deselect();
  });

  /* ── Arrow ── */
  function clearArrow() {
    while(arrowSvg.firstChild) arrowSvg.removeChild(arrowSvg.firstChild);
  }

  function drawArrow(fromRow, fromCol, toRow, toCol) {
    clearArrow();
    var x1 = fromCol*SQ + SQ/2, y1 = fromRow*SQ + SQ/2;
    var x2 = toCol*SQ   + SQ/2, y2 = toRow*SQ   + SQ/2;
    var dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy)||1;
    var ex=x2-(dx/len)*8, ey=y2-(dy/len)*8;
    var ns='http://www.w3.org/2000/svg';
    var defs=document.createElementNS(ns,'defs');

    var marker=document.createElementNS(ns,'marker');
    marker.setAttribute('id','ah'); marker.setAttribute('markerWidth','10');
    marker.setAttribute('markerHeight','7'); marker.setAttribute('refX','9');
    marker.setAttribute('refY','3.5'); marker.setAttribute('orient','auto');
    var poly=document.createElementNS(ns,'polygon');
    poly.setAttribute('points','0 0, 10 3.5, 0 7'); poly.setAttribute('fill','yellow');
    marker.appendChild(poly); defs.appendChild(marker);

    var filt=document.createElementNS(ns,'filter'); filt.setAttribute('id','sh');
    var fe=document.createElementNS(ns,'feDropShadow');
    fe.setAttribute('dx','0'); fe.setAttribute('dy','0');
    fe.setAttribute('stdDeviation','2'); fe.setAttribute('flood-color','rgba(0,0,0,0.8)');
    filt.appendChild(fe); defs.appendChild(filt);
    arrowSvg.appendChild(defs);

    var line=document.createElementNS(ns,'line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',ex); line.setAttribute('y2',ey);
    line.setAttribute('stroke','yellow'); line.setAttribute('stroke-width','4');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('marker-end','url(#ah)');
    line.setAttribute('filter','url(#sh)');
    arrowSvg.appendChild(line);
  }

  function setStatus(msg){ statusMsg.textContent = msg; }

  /* ── Board events ── */
  board.addEventListener('add', function(e){ createCheckerEl(e.details.checker); });

  board.addEventListener('remove', function(e){
    if(!bulkClearing) clearArrow();
    removeCheckerEl(e.details.checker);
  });

  board.addEventListener('move', function(e){
    var d=e.details;
    drawArrow(d.fromRow, d.fromCol, d.toRow, d.toCol);
    updateCheckerEl(d.checker);
    setStatus('Moved '+d.checker.color+(d.checker.isKing?' king':'')+
      ' ['+d.fromRow+','+d.fromCol+'] → ['+d.toRow+','+d.toCol+']');
  });

  board.addEventListener('promote', function(e){
    var c=e.details.checker;
    updateCheckerEl(c);
    setStatus(c.color+' at ['+c.row+','+c.col+'] promoted to King!');
  });

  /* ── Buttons ── */
  document.getElementById('btnNewGame').addEventListener('click', function(){
    deselect(); clearArrow(); removeAllEls();
    board.prepareNewGame();
    setStatus('New game! Click a piece to select it, then click a square to move.');
  });

  document.getElementById('btnMoveRandomly').addEventListener('click', function(){
    deselect();
    var ch=board.getRandomChecker(), loc=board.getRandomEmptyLocation();
    if(ch&&loc){ board.moveTo(ch,loc.row,loc.col); }
    else { setStatus('No valid move available.'); }
  });

  document.getElementById('btnKingRandomly').addEventListener('click', function(){
    var ch=board.getRandomNonKing();
    if(ch){ board.promote(ch); }
    else { setStatus('No non-king pieces remaining.'); }
  });

  document.getElementById('btnClear').addEventListener('click', function(){
    deselect(); bulkClearing=true;
    board.clear(); bulkClearing=false;
    clearArrow(); removeAllEls();
    setStatus('Board cleared.');
  });

  /* ── Init ── */
  drawBoard();
  board.prepareNewGame();
  setStatus('New game! Click a piece to select it, then click a square to move.');
})();
</script>
</body>
</html>
