<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkerboard</title>
<style>
  body {
    background-color: #f8dcdc; /* light red */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .board-wrap {
    position: relative;
    width: 400px;
    height: 400px;
    border: 2px solid black;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
  }
  #piecesLayer {
    position: absolute;
    top: 0; left: 0;
    width: 400px;
    height: 400px;
    pointer-events: none; /* let mouse go through to canvas for dragging */
  }
  .checker {
    position: absolute;
    border-radius: 50%;
    cursor: grab;
  }
</style>
</head>
<body>

<div class="board-wrap">
  <canvas id="boardCanvas" width="400" height="400"></canvas>
  <div id="piecesLayer"></div>
  <svg id="arrowSvg" width="400" height="400" style="position:absolute; top:0; left:0; pointer-events:none;"></svg>
</div>

<script>
// Board setup
const BOARD_SIZE = 8;
const BOARD_PX = 400;
const SQ = BOARD_PX / BOARD_SIZE;
const boardCanvas = document.getElementById('boardCanvas');
const ctx = boardCanvas.getContext('2d');
const piecesLayer = document.getElementById('piecesLayer');
const arrowSvg = document.getElementById('arrowSvg');

function drawBoard() {
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? 'white' : 'gray';
      ctx.fillRect(c*SQ, r*SQ, SQ, SQ);
    }
  }
}
drawBoard();

// Load pieces
const pieces = []; // {el, row, col, color}

function createPiece(row, col, color) {
  const el = document.createElement('img');
  el.src = color === 'red' ? 'red-piece.png' : 'black-piece.png';
  el.className = 'checker';
  el.style.width = SQ + 'px';
  el.style.height = SQ + 'px';
  el.style.left = col*SQ + 'px';
  el.style.top = row*SQ + 'px';
  piecesLayer.appendChild(el);
  pieces.push({el, row, col, color});
  makeDraggable(el);
}

// Example starting positions
for (let i = 0; i < 8; i++) {
  if (i % 2 === 0) createPiece(0, i, 'black');
  if (i % 2 === 1) createPiece(7, i, 'red');
}

// Drag-and-drop
function makeDraggable(el) {
  let offsetX, offsetY;
  let currentPiece;

  el.addEventListener('mousedown', e => {
    currentPiece = pieces.find(p => p.el === el);
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    el.style.cursor = 'grabbing';
    el.style.pointerEvents = 'auto';
  });

  document.addEventListener('mousemove', e => {
    if (!currentPiece) return;
    el.style.left = e.pageX - offsetX - piecesLayer.getBoundingClientRect().left + 'px';
    el.style.top  = e.pageY - offsetY - piecesLayer.getBoundingClientRect().top + 'px';
  });

  document.addEventListener('mouseup', e => {
    if (!currentPiece) return;
    const newCol = Math.floor((e.pageX - piecesLayer.getBoundingClientRect().left) / SQ);
    const newRow = Math.floor((e.pageY - piecesLayer.getBoundingClientRect().top) / SQ);

    // Draw arrow from old to new
    drawArrow(currentPiece.col, currentPiece.row, newCol, newRow);

    currentPiece.row = newRow;
    currentPiece.col = newCol;
    el.style.left = newCol*SQ + 'px';
    el.style.top  = newRow*SQ + 'px';

    currentPiece = null;
    el.style.cursor = 'grab';
  });
}

// Arrow drawing
function drawArrow(fromCol, fromRow, toCol, toRow) {
  while (arrowSvg.firstChild) arrowSvg.removeChild(arrowSvg.firstChild);
  const ns = 'http://www.w3.org/2000/svg';
  const line = document.createElementNS(ns, 'line');
  line.setAttribute('x1', fromCol*SQ + SQ/2);
  line.setAttribute('y1', fromRow*SQ + SQ/2);
  line.setAttribute('x2', toCol*SQ + SQ/2);
  line.setAttribute('y2', toRow*SQ + SQ/2);
  line.setAttribute('stroke', 'yellow');
  line.setAttribute('stroke-width', '4');
  line.setAttribute('marker-end', 'url(#arrowhead)');
  arrowSvg.appendChild(line);

  const defs = document.createElementNS(ns, 'defs');
  const marker = document.createElementNS(ns, 'marker');
  marker.setAttribute('id','arrowhead');
  marker.setAttribute('markerWidth','10');
  marker.setAttribute('markerHeight','7');
  marker.setAttribute('refX','9');
  marker.setAttribute('refY','3.5');
  marker.setAttribute('orient','auto');
  const poly = document.createElementNS(ns, 'polygon');
  poly.setAttribute('points','0 0, 10 3.5, 0 7');
  poly.setAttribute('fill','yellow');
  marker.appendChild(poly);
  defs.appendChild(marker);
  arrowSvg.appendChild(defs);
}
</script>
</body>
</html>
