<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkerboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f8dcdc; /* light red background */
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 { font-size: 1.4rem; color: #111; margin-bottom: 20px; }
  .layout { display: flex; gap: 24px; align-items: flex-start; }

  .board-wrap { position: relative; width: 400px; height: 400px; border: 2px solid #111; }
  #boardCanvas { position: absolute; top:0; left:0; display: block; }
  #piecesLayer { position: absolute; top:0; left:0; width:400px; height:400px; z-index:10; }
  #arrowSvg { position:absolute; top:0; left:0; width:400px; height:400px; pointer-events:none; z-index:20; }

  .checker { position:absolute; width:42px; height:42px; border-radius:50%; cursor:pointer; overflow:hidden; }
  .checker img { width:100%; height:100%; object-fit:contain; display:block; pointer-events:none; }
  .checker.selected { outline: 3px solid yellow; outline-offset: 1px; }

  .panel { width:140px; display:flex; flex-direction:column; gap:8px; }
  .btn { background:#cc0000; color:#fff; border:none; padding:10px 0; font-size:0.82rem; cursor:pointer; width:100%; text-align:center; }
  .btn:hover { background:#aa0000; }
  .btn.secondary { background:#111; color:#fff; }
  .btn.secondary:hover { background:#333; }
  #statusMsg { margin-top:6px; font-size:0.72rem; color:#111; line-height:1.5; border-top:1px solid #ccc; padding-top:8px; }
  .hint { margin-top:8px; font-size:0.65rem; color:#888; line-height:1.5; }
</style>
</head>
<body>

<h1>Checkerboard</h1>

<div class="layout">
  <div class="board-wrap">
    <canvas id="boardCanvas" width="400" height="400"></canvas>
    <div id="piecesLayer"></div>
    <svg id="arrowSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="panel">
    <button class="btn" id="btnAddRed">Add Red Piece</button>
    <button class="btn secondary" id="btnAddBlack">Add Black Piece</button>
    <button class="btn secondary" id="btnClear">Clear Board</button>
    <div id="statusMsg">Click "Add Piece" and then click a square to place it.</div>
  </div>
</div>

<script>
(function(){
  const BOARD_SIZE = 8;
  const BOARD_PX = 400;
  const SQ = BOARD_PX / BOARD_SIZE;
  const PAD = 4;

  const boardCanvas = document.getElementById('boardCanvas');
  const ctx = boardCanvas.getContext('2d');
  const piecesLayer = document.getElementById('piecesLayer');
  const arrowSvg = document.getElementById('arrowSvg');
  const statusMsg = document.getElementById('statusMsg');

  let pieces = []; // {el, row, col, color}
  let selectedPiece = null;
  let addingColor = null;

  const IMG_SRC = {
    red: 'red-piece.png',
    black: 'black-piece.png'
  };

  function drawBoard(){
    for(let r=0;r<BOARD_SIZE;r++){
      for(let c=0;c<BOARD_SIZE;c++){
        ctx.fillStyle = (r+c)%2===0 ? '#ffffff' : '#cccccc';
        ctx.fillRect(c*SQ, r*SQ, SQ, SQ);
      }
    }
  }

  function setStatus(msg){ statusMsg.textContent = msg; }

  function createPiece(row, col, color){
    const el = document.createElement('div');
    el.className = 'checker';
    el.style.width = (SQ-PAD*2)+'px';
    el.style.height = (SQ-PAD*2)+'px';
    el.style.left = (col*SQ+PAD)+'px';
    el.style.top  = (row*SQ+PAD)+'px';

    const img = document.createElement('img');
    img.src = IMG_SRC[color];
    el.appendChild(img);

    piecesLayer.appendChild(el);
    const piece = {el,row,col,color};
    pieces.push(piece);

    el.addEventListener('mousedown', startDrag(piece));
    el.addEventListener('click', e=>{
      e.stopPropagation();
      selectPiece(piece);
    });

    return piece;
  }

  function selectPiece(piece){
    if(selectedPiece) selectedPiece.el.classList.remove('selected');
    selectedPiece = piece;
    piece.el.classList.add('selected');
    setStatus(`Selected ${piece.color} at [${piece.row},${piece.col}]. Click a square to move.`);
  }

  function deselectPiece(){
    if(selectedPiece) selectedPiece.el.classList.remove('selected');
    selectedPiece = null;
  }

  function getPieceAt(row,col){
    return pieces.find(p=>p.row===row && p.col===col);
  }

  function clearArrow(){
    while(arrowSvg.firstChild) arrowSvg.removeChild(arrowSvg.firstChild);
  }

  function drawArrow(fromRow, fromCol, toRow, toCol){
    clearArrow();
    const x1 = fromCol*SQ+SQ/2, y1 = fromRow*SQ+SQ/2;
    const x2 = toCol*SQ+SQ/2, y2 = toRow*SQ+SQ/2;
    const ns='http://www.w3.org/2000/svg';
    const defs=document.createElementNS(ns,'defs');
    const marker=document.createElementNS(ns,'marker');
    marker.setAttribute('id','arrowhead');
    marker.setAttribute('markerWidth','10');
    marker.setAttribute('markerHeight','7');
    marker.setAttribute('refX','9');
    marker.setAttribute('refY','3.5');
    marker.setAttribute('orient','auto');
    const poly=document.createElementNS(ns,'polygon');
    poly.setAttribute('points','0 0, 10 3.5, 0 7');
    poly.setAttribute('fill','yellow');
    marker.appendChild(poly);
    defs.appendChild(marker);
    arrowSvg.appendChild(defs);

    const line = document.createElementNS(ns,'line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','yellow'); line.setAttribute('stroke-width','4');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('marker-end','url(#arrowhead)');
    arrowSvg.appendChild(line);
  }

  function startDrag(piece){
    return function(e){
      e.preventDefault();
      const offsetX = e.offsetX, offsetY = e.offsetY;

      function moveHandler(ev){
        piece.el.style.left = (ev.pageX - piecesLayer.getBoundingClientRect().left - offsetX)+'px';
        piece.el.style.top  = (ev.pageY - piecesLayer.getBoundingClientRect().top - offsetY)+'px';
      }

      function upHandler(ev){
        document.removeEventListener('mousemove', moveHandler);
        document.removeEventListener('mouseup', upHandler);
        const col = Math.floor((ev.pageX - piecesLayer.getBoundingClientRect().left)/SQ);
        const row = Math.floor((ev.pageY - piecesLayer.getBoundingClientRect().top)/SQ);
        if(row>=0 && row<BOARD_SIZE && col>=0 && col<BOARD_SIZE){
          drawArrow(piece.row,piece.col,row,col);
          piece.row = row; piece.col = col;
          piece.el.style.left = (col*SQ+PAD)+'px';
          piece.el.style.top  = (row*SQ+PAD)+'px';
        }
      }

      document.addEventListener('mousemove', moveHandler);
      document.addEventListener('mouseup', upHandler);
    };
  }

  boardCanvas.addEventListener('click', function(e){
    const rect = boardCanvas.getBoundingClientRect();
    const col = Math.floor((e.clientX - rect.left)/SQ);
    const row = Math.floor((e.clientY - rect.top)/SQ);

    if(addingColor){
      if(getPieceAt(row,col)) return;
      createPiece(row,col,addingColor);
      addingColor = null;
      setStatus(`${row},${col} added.`);
    } else if(selectedPiece){
      if(getPieceAt(row,col)) return;
      drawArrow(selectedPiece.row, selectedPiece.col, row, col);
      selectedPiece.row = row; selectedPiece.col = col;
      selectedPiece.el.style.left = (col*SQ+PAD)+'px';
      selectedPiece.el.style.top  = (row*SQ+PAD)+'px';
      deselectPiece();
    }
  });

  document.getElementById('btnAddRed').addEventListener('click', ()=>{ addingColor='red'; setStatus('Click a square to add a red piece'); });
  document.getElementById('btnAddBlack').addEventListener('click', ()=>{ addingColor='black'; setStatus('Click a square to add a black piece'); });
  document.getElementById('btnClear').addEventListener('click', ()=>{
    pieces.forEach(p=>p.el.remove());
    pieces = [];
    clearArrow();
    deselectPiece();
    setStatus('Board cleared.');
  });

  drawBoard();
})();
</script>
</body>
</html>
